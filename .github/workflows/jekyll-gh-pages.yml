<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高科技贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            padding: 20px;
            width: 100%;
            max-width: 800px;
        }

        h1 {
            font-size: 3.2rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #00dbde, #fc00ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(0, 219, 222, 0.5);
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #a0a0ff;
            margin-bottom: 5px;
        }

        .made-by {
            font-size: 1.1rem;
            color: #ffcc00;
            background: rgba(255, 204, 0, 0.1);
            padding: 8px 20px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 10px;
            border: 1px solid rgba(255, 204, 0, 0.3);
        }

        .game-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }

        .left-panel {
            flex: 1;
            min-width: 300px;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .game-container {
            background: rgba(10, 10, 40, 0.7);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 150, 255, 0.2);
            border: 1px solid rgba(100, 100, 255, 0.3);
        }

        .canvas-container {
            position: relative;
            width: 100%;
            margin-bottom: 20px;
        }

        #gameCanvas {
            display: block;
            background-color: #0a0a1a;
            border-radius: 10px;
            border: 2px solid #2a2a7a;
            box-shadow: 0 0 20px rgba(0, 200, 255, 0.3);
            width: 100%;
            max-width: 600px;
            height: auto;
        }

        .score-container {
            text-align: center;
            padding: 15px;
            background: rgba(20, 20, 60, 0.8);
            border-radius: 10px;
            border: 1px solid #3a3a9a;
        }

        #score {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.7);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .control-panel {
            background: rgba(20, 20, 60, 0.8);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 0 20px rgba(0, 100, 255, 0.2);
            border: 1px solid rgba(100, 100, 255, 0.3);
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #00ccff;
            border-bottom: 2px solid #00ccff;
            padding-bottom: 8px;
        }

        .speed-control {
            margin-bottom: 25px;
        }

        .speed-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        #speedValue {
            color: #ffcc00;
            font-weight: bold;
        }

        #speedSlider {
            width: 100%;
            height: 12px;
            -webkit-appearance: none;
            appearance: none;
            background: linear-gradient(to right, #0066cc, #00ccff);
            border-radius: 10px;
            outline: none;
        }

        #speedSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #00ffcc;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.8);
        }

        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        button {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }

        #startBtn {
            background: linear-gradient(to right, #00b09b, #96c93d);
        }

        #startBtn:hover {
            background: linear-gradient(to right, #009688, #8bc34a);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 176, 155, 0.4);
        }

        #pauseBtn {
            background: linear-gradient(to right, #ff8a00, #e52e71);
        }

        #pauseBtn:hover {
            background: linear-gradient(to right, #ff7700, #d81b60);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 138, 0, 0.4);
        }

        #restartBtn {
            grid-column: span 2;
            background: linear-gradient(to right, #6a11cb, #2575fc);
        }

        #restartBtn:hover {
            background: linear-gradient(to right, #5a0bbb, #1c65ec);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(106, 17, 203, 0.4);
        }

        .instructions {
            background: rgba(20, 20, 60, 0.8);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 0 20px rgba(0, 100, 255, 0.2);
            border: 1px solid rgba(100, 100, 255, 0.3);
        }

        .instructions ul {
            list-style-type: none;
            padding-left: 10px;
        }

        .instructions li {
            margin-bottom: 12px;
            padding-left: 25px;
            position: relative;
        }

        .instructions li:before {
            content: "▶";
            color: #00ccff;
            position: absolute;
            left: 0;
        }

        .game-status {
            text-align: center;
            padding: 15px;
            font-size: 1.3rem;
            min-height: 30px;
            margin-top: 10px;
        }

        #status {
            color: #ffcc00;
            font-weight: bold;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            color: #8888cc;
            font-size: 0.9rem;
            padding: 20px;
            width: 100%;
            max-width: 800px;
        }

        @media (max-width: 768px) {
            .game-area {
                flex-direction: column;
                align-items: center;
            }
            
            .left-panel {
                width: 100%;
                max-width: 600px;
            }
            
            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>高科技贪吃蛇</h1>
        <div class="subtitle">未来感游戏体验 | 智能速度调节 | 炫酷视觉效果</div>
        <div class="made-by">由苏浩然社团制作</div>
    </div>

    <div class="game-area">
        <div class="left-panel">
            <div class="control-panel">
                <h2>游戏控制</h2>
                <div class="speed-control">
                    <div class="speed-label">
                        <span>游戏速度：</span>
                        <span id="speedValue">中速</span>
                    </div>
                    <input type="range" id="speedSlider" min="1" max="10" value="5">
                </div>
                
                <div class="buttons">
                    <button id="startBtn">开始游戏</button>
                    <button id="pauseBtn">暂停游戏</button>
                    <button id="restartBtn">重新开始</button>
                </div>
                
                <div class="game-status">
                    状态: <span id="status">等待开始</span>
                </div>
            </div>
            
            <div class="instructions">
                <h2>游戏说明</h2>
                <ul>
                    <li>使用 <strong>W A S D</strong> 或 <strong>方向键</strong> 控制蛇的移动方向</li>
                    <li>蛇头碰到墙壁或自己的身体会导致游戏结束</li>
                    <li>每吃到一个食物得分增加10分，蛇身长度增加</li>
                    <li>通过上方滑块可以实时调节游戏速度</li>
                    <li>点击"开始游戏"开始，点击"暂停游戏"暂停</li>
                </ul>
            </div>
        </div>
        
        <div class="game-container">
            <div class="canvas-container">
                <canvas id="gameCanvas" width="600" height="600"></canvas>
            </div>
            
            <div class="score-container">
                <div>当前得分</div>
                <div id="score">0</div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        版权所有 © 2026 苏浩然社团 | 贪吃蛇游戏 v2.0 | 采用HTML5 Canvas技术
    </div>

    <script>
        // 获取Canvas和上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏参数
        const gridSize = 20;
        const gridWidth = canvas.width / gridSize;
        const gridHeight = canvas.height / gridSize;
        
        // 游戏状态
        let snake = [];
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let gameSpeed = 150; // 初始速度（毫秒）
        let gameInterval;
        let isPaused = false;
        let isGameOver = false;
        
        // DOM元素
        const scoreElement = document.getElementById('score');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const restartBtn = document.getElementById('restartBtn');
        const statusElement = document.getElementById('status');
        
        // 初始化游戏
        function initGame() {
            // 初始化蛇 - 长度为3，水平放置
            snake = [
                {x: 5, y: 10},
                {x: 4, y: 10},
                {x: 3, y: 10}
            ];
            
            // 生成第一个食物
            generateFood();
            
            // 重置游戏状态
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            scoreElement.textContent = score;
            isGameOver = false;
            statusElement.textContent = '等待开始';
            
            // 绘制初始状态
            draw();
        }
        
        // 生成食物
        function generateFood() {
            // 确保食物不会生成在蛇身上
            let foodOnSnake;
            do {
                foodOnSnake = false;
                food = {
                    x: Math.floor(Math.random() * gridWidth),
                    y: Math.floor(Math.random() * gridHeight)
                };
                
                // 检查食物是否在蛇身上
                for (let segment of snake) {
                    if (segment.x === food.x && segment.y === food.y) {
                        foodOnSnake = true;
                        break;
                    }
                }
            } while (foodOnSnake);
        }
        
        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格线
            ctx.strokeStyle = 'rgba(100, 100, 200, 0.1)';
            ctx.lineWidth = 1;
            
            // 垂直线
            for (let x = 0; x <= canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            
            // 水平线
            for (let y = 0; y <= canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            
            // 绘制蛇
            snake.forEach((segment, index) => {
                // 蛇头
                if (index === 0) {
                    // 高科技感蛇头
                    ctx.fillStyle = '#00ffcc';
                    ctx.shadowColor = '#00ffcc';
                    ctx.shadowBlur = 15;
                    ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize, gridSize);
                    
                    // 蛇头内部亮点
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowBlur = 0;
                    ctx.fillRect(
                        segment.x * gridSize + gridSize/4, 
                        segment.y * gridSize + gridSize/4, 
                        gridSize/6, 
                        gridSize/6
                    );
                } 
                // 蛇身
                else {
                    // 渐变颜色 - 从头部到尾部颜色渐变
                    const intensity = 1 - (index / snake.length) * 0.7;
                    const r = Math.floor(0 * intensity);
                    const g = Math.floor(255 * intensity);
                    const b = Math.floor(200 * intensity);
                    
                    ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                    ctx.shadowColor = `rgb(${r}, ${g}, ${b})`;
                    ctx.shadowBlur = 10;
                    ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize, gridSize);
                }
            });
            
            // 重置阴影
            ctx.shadowBlur = 0;
            
            // 绘制食物
            ctx.fillStyle = '#ff3366';
            ctx.shadowColor = '#ff3366';
            ctx.shadowBlur = 20;
            
            // 食物主体
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize/2,
                food.y * gridSize + gridSize/2,
                gridSize/2 - 1,
                0,
                Math.PI * 2
            );
            ctx.fill();
            
            // 食物内部亮点
            ctx.fillStyle = '#ffcc00';
            ctx.shadowBlur = 5;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize/3,
                food.y * gridSize + gridSize/3,
                gridSize/6,
                0,
                Math.PI * 2
            );
            ctx.fill();
            
            // 重置阴影
            ctx.shadowBlur = 0;
            
            // 如果游戏结束，显示游戏结束文字
            if (isGameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.font = 'bold 48px Arial';
                ctx.fillStyle = '#ff3366';
                ctx.textAlign = 'center';
                ctx.fillText('游戏结束!', canvas.width/2, canvas.height/2 - 40);
                
                ctx.font = '24px Arial';
                ctx.fillStyle = '#00ccff';
                ctx.fillText(`最终得分: ${score}`, canvas.width/2, canvas.height/2 + 20);
                
                ctx.font = '20px Arial';
                ctx.fillStyle = '#ccccff';
                ctx.fillText('点击"重新开始"按钮再来一局', canvas.width/2, canvas.height/2 + 60);
            }
        }
        
        // 更新游戏状态
        function update() {
            if (isPaused || isGameOver) return;
            
            // 更新蛇的方向
            direction = nextDirection;
            
            // 根据方向计算新的蛇头位置
            const head = {...snake[0]};
            
            switch(direction) {
                case 'up': head.y -= 1; break;
                case 'down': head.y += 1; break;
                case 'left': head.x -= 1; break;
                case 'right': head.x += 1; break;
            }
            
            // 检查是否撞墙
            if (head.x < 0 || head.x >= gridWidth || head.y < 0 || head.y >= gridHeight) {
                gameOver();
                return;
            }
            
            // 检查是否撞到自己
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }
            
            // 将新头部添加到蛇身
            snake.unshift(head);
            
            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                // 增加分数
                score += 10;
                scoreElement.textContent = score;
                
                // 生成新食物
                generateFood();
            } else {
                // 如果没有吃到食物，移除尾部
                snake.pop();
            }
            
            // 重新绘制游戏
            draw();
        }
        
        // 游戏结束
        function gameOver() {
            isGameOver = true;
            clearInterval(gameInterval);
            statusElement.textContent = '游戏结束';
            draw();
        }
        
        // 开始游戏
        function startGame() {
            if (isGameOver) {
                initGame();
            }
            
            if (!gameInterval) {
                isPaused = false;
                statusElement.textContent = '游戏中';
                gameInterval = setInterval(update, gameSpeed);
            }
        }
        
        // 暂停游戏
        function pauseGame() {
            if (gameInterval && !isGameOver) {
                clearInterval(gameInterval);
                gameInterval = null;
                isPaused = true;
                statusElement.textContent = '已暂停';
            }
        }
        
        // 重新开始游戏
        function restartGame() {
            clearInterval(gameInterval);
            gameInterval = null;
            initGame();
            statusElement.textContent = '等待开始';
        }
        
        // 更新游戏速度
        function updateSpeed() {
            const speedLevel = parseInt(speedSlider.value);
            
            // 速度级别到实际速度的映射（值越小速度越快）
            const speedMap = {
                1: 300,  // 非常慢
                2: 250,
                3: 200,
                4: 150,
                5: 120,  // 中等
                6: 100,
                7: 80,
                8: 60,
                9: 40,
                10: 20   // 非常快
            };
            
            gameSpeed = speedMap[speedLevel];
            
            // 更新速度显示文本
            const speedTexts = {
                1: "非常慢", 2: "很慢", 3: "较慢", 4: "慢", 5: "中速",
                6: "较快", 7: "快", 8: "很快", 9: "极快", 10: "光速"
            };
            speedValue.textContent = speedTexts[speedLevel];
            
            // 如果游戏正在进行中，重新设置间隔
            if (gameInterval && !isPaused) {
                clearInterval(gameInterval);
                gameInterval = setInterval(update, gameSpeed);
            }
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            // 防止按键滚动页面
            if ([37, 38, 39, 40, 65, 87, 68, 83].includes(e.keyCode)) {
                e.preventDefault();
            }
            
            switch(e.key) {
                    // 方向键控制
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction !== 'down') nextDirection = 'up';
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction !== 'up') nextDirection = 'down';
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction !== 'right') nextDirection = 'left';
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction !== 'left') nextDirection = 'right';
                    break;
                case ' ': // 空格键暂停/继续
                    if (isPaused || !gameInterval) {
                        startGame();
                    } else {
                        pauseGame();
                    }
                    break;
            }
        });
        
        // 事件监听
        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', pauseGame);
        restartBtn.addEventListener('click', restartGame);
        speedSlider.addEventListener('input', updateSpeed);
        
        // 初始化游戏
        initGame();
        
        // 初始绘制
        draw();
    </script>
</body>
</html>
